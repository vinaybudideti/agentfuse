[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "agentfuse-runtime"
version = "0.2.0-alpha"
description = "The Intelligent Agent Cost Optimization Runtime"
requires-python = ">=3.9"
license = {text = "MIT"}
readme = "README.md"
keywords = ["llm", "ai-agents", "cost-optimization", "semantic-caching", "budget-enforcement"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "faiss-cpu",
    "sentence-transformers",
    "tiktoken",
    "tenacity",
    "fastapi",
    "httpx",
    "openai",
    "anthropic",
]

[project.urls]
Homepage = "https://github.com/vinaybudideti/agentfuse"
Repository = "https://github.com/vinaybudideti/agentfuse"
Documentation = "https://agentfuse.dev"

[tool.setuptools.packages.find]
include = ["agentfuse*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
